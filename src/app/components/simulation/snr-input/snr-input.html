<div class = "slider-group">
    <label>Interference Level</label>
    <div class = "slider-row">
        <mat-slider [min]="0" [max] = "1" [step] = "0.05" class = "slider">
            <input matSliderThumb [(ngModel)] ="interference"
    (valueChange) = "onInterferenceChange($event)" />
    </mat-slider>
    <input class = "value-box" type="number" [(ngModel)] = "interference"
    (change) = "onInterferenceChange(interference)" [min]="0" [max] = "1" [step]="0.5" />
    </div>
    <div class = "range-labels"><span>0.0</span><span>1.0</span></div>
    </div>
